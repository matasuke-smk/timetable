<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>上高野バス 平日ダイヤ</title>
<meta name="theme-color" content="#0f0f10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="バス">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0f0f10; --card:#1a1a1c; --line:rgba(255,255,255,.09);
    --ink:#f1f1f1; --sub:#9b9a96; --hint:#65645f;
    --c31:#5aa7ee; --c31bg:#15314c; --c65:#3fcca1; --c65bg:#123a30;
    --next:#3a3216; --nextline:#8a7426; --nextink:#f3da8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.4;
    height:100vh; height:100dvh; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;
    padding:max(16px,env(safe-area-inset-top)) 14px max(4px,env(safe-area-inset-bottom));}
  .hd{flex-shrink:0}
  #list{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  h1{font-size:17px;font-weight:600;letter-spacing:.01em}
  .meta{font-size:13px;color:var(--ink);margin:3px 0 14px}
  .route{font-size:19px;font-weight:600;color:var(--ink);margin:2px 2px 9px;display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap}
  .dots{display:flex;justify-content:center;gap:11px;margin:0 0 14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--hint);cursor:pointer;transition:background .15s,transform .15s}
  .dot.on{background:var(--ink);transform:scale(1.3)}
  .route .ar{color:var(--c65);font-weight:500}
  .card{background:var(--card);border:.5px solid var(--line);border-radius:14px;overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:13px 15px;border-top:.5px solid var(--line)}
  .row:first-child{border-top:none}
  .b{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:22px;border-radius:6px;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
  .b31{background:var(--c31bg);color:var(--c31)}
  .b65{background:var(--c65bg);color:var(--c65)}
  .time{display:flex;align-items:center;gap:8px;font-size:18px;font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .time b{font-weight:600}
  .time .to{color:var(--hint);font-size:15px}
  .time .arr{color:var(--sub);font-weight:500}
  .row .right{margin-left:auto;display:flex;align-items:center;gap:9px}
  .dur{font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}
  .row.next{background:var(--next)}
  .tagwrap{flex:1;display:flex;justify-content:center;align-items:center}
  .row.next .tag{font-size:20px;font-weight:700;color:var(--nextink);background:rgba(0,0,0,.25);border:.5px solid var(--nextline);border-radius:99px;padding:4px 14px;white-space:nowrap}
  .foot{flex-shrink:0;margin-top:13px;padding:0 4px;font-size:11px;color:var(--hint);line-height:1.7}
  .legend{display:flex;gap:14px;margin-top:6px}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="meta">平日のみ・2026年3月20日改正（お盆/年末年始を除く）</div>
    <div class="route" id="route"></div>
    <div class="dots" id="dots">
      <span class="dot" id="d-go" onclick="show('go')" role="button" aria-label="行き"></span>
      <span class="dot" id="d-back" onclick="show('back')" role="button" aria-label="帰り"></span>
    </div>
  </div>
  <div class="card" id="list"></div>

  <div class="foot">
    <div id="status"></div>
    <div>発（左）→着（右）、右端は所要時間。</div>
    <div class="legend">
      <span><i style="background:var(--c31)"></i>31 祇園・四条河原町まわり</span>
      <span><i style="background:var(--c65)"></i>65 烏丸丸太町まわり</span>
    </div>
  </div>
</div>

<script>
var DATA=null,CURRENT='go';
function toMin(t){var p=t.split(":");return +p[0]*60+ +p[1];}
function show(k){
  CURRENT=k;
  document.getElementById('d-go').className='dot'+(k==='go'?' on':'');
  document.getElementById('d-back').className='dot'+(k==='back'?' on':'');
  if(!DATA)return;
  var d=DATA[k];
  document.getElementById('route').innerHTML=d.route[0]+' <span class="ar">→</span> '+d.route[1];
  var now=new Date(),wd=now.getDay()!==0&&now.getDay()!==6,nm=now.getHours()*60+now.getMinutes(),done=false;
  var html='';
  d.trips.forEach(function(tr){
    var nx=wd&&!done&&toMin(tr[1])>=nm;if(nx)done=true;
    var dur=toMin(tr[2])-toMin(tr[1]);
    html+='<div class="row'+(nx?' next':'')+'"'+(nx?' id="nextbus"':'')+'>'
      +'<span class="b b'+tr[0]+'">'+tr[0]+'</span>'
      +'<span class="time"><b>'+tr[1]+'</b><span class="to">→</span><b class="arr">'+tr[2]+'</b></span>'
      +(nx?'<span class="tagwrap"><span class="tag">次発</span></span>':'')
      +'<span class="right"><span class="dur">'+dur+'分</span></span>'
      +'</div>';
  });
  document.getElementById('list').innerHTML=html;
  var nb=document.getElementById('nextbus');
  if(nb)nb.scrollIntoView({block:'center',behavior:'auto'});
}
(function(){
  var now=new Date(),st=document.getElementById('status');
  if(now.getDay()===0||now.getDay()===6) st.textContent='※ 本日は土日です。この表は平日専用です。';
  fetch('timetable.json').then(function(r){return r.json();}).then(function(j){
    DATA={
      go:{route:[j.go.from+' 発',j.go.to+' 着'],trips:j.go.trips},
      back:{route:[j.back.from+' 発',j.back.to+' 着'],trips:j.back.trips}
    };
    show(now.getHours()<12?'go':'back');
  }).catch(function(){
    document.getElementById('list').innerHTML='<div class="row">時刻表を読み込めませんでした。通信環境をご確認のうえ再読み込みしてください。</div>';
  });
})();
(function(){
  var sx=0,sy=0,tracking=false;
  document.addEventListener('touchstart',function(e){
    if(e.touches.length!==1){tracking=false;return;}
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;tracking=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!tracking)return;tracking=false;
    var t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;
    if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy)*1.5)return;
    show(dx<0?'back':'go');
  },{passive:true});
})();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
